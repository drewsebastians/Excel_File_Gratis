name: Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validation-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    name: Check, build, and validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Astro check
        run: pnpm run check

      - name: Build static site
        run: pnpm run build

      - name: Run project validation
        run: pnpm run validate
