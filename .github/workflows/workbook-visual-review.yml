name: Workbook visual review

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'public/downloads/template-*.xlsx'
      - 'scripts/audit-draft-workbooks.py'
      - 'scripts/generate-workbook-visual-review.py'
      - '.github/workflows/workbook-visual-review.yml'
  push:
    branches: [main]
    paths:
      - 'public/downloads/template-*.xlsx'
      - 'scripts/audit-draft-workbooks.py'
      - 'scripts/generate-workbook-visual-review.py'
      - '.github/workflows/workbook-visual-review.yml'

permissions:
  contents: read

jobs:
  render-draft-workbooks:
    name: Render draft workbooks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install rendering tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes libreoffice-core libreoffice-calc poppler-utils
      - name: Install repository dependencies
        run: pnpm install --frozen-lockfile
      - name: Run structural workbook QA
        run: pnpm run qa:workbooks
      - name: Render all draft workbooks
        run: pnpm run qa:workbook-visuals
      - name: Upload visual-review package
        uses: actions/upload-artifact@v4
        with:
          name: workbook-visual-review-${{ github.sha }}
          path: |
            artifacts/workbook-visual-review/
            docs/qa/workbook-visual-review-manifest.json
          if-no-files-found: error
          retention-days: 30
